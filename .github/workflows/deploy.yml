name: Build And Deploy HK PMTiles

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROTOMAPS_BASEMAPS_REF: c809cd18333494c948ebc4228108a7ebf4f210ee
  SOURCE_CACHE_VERSION: v1
  HONG_KONG_PBF_URL: https://download.geofabrik.de/asia/china/hong-kong-latest.osm.pbf
  NATURAL_EARTH_URL: https://naciscdn.org/naturalearth/packages/natural_earth_vector.sqlite.zip
  QRANK_URL: https://qrank.toolforge.org/download/qrank.csv.gz
  WATER_POLYGONS_URL: https://osmdata.openstreetmap.de/download/water-polygons-split-3857.zip
  LAND_POLYGONS_URL: https://osmdata.openstreetmap.de/download/land-polygons-split-3857.zip
  LANDCOVER_URL: https://r2-public.protomaps.com/datasets/daylight-landcover.gpkg
  PGF_ENCODING_URL: https://wipfli.github.io/pgf-encoding/pgf-encoding.zip

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 16 */4 * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify viewer files
        run: |
          test -f index.html
          test -f app.js
          test -f styles.css
          test -f .nojekyll

      - name: Clone protomaps basemaps
        run: |
          git clone https://github.com/protomaps/basemaps.git
          git -C basemaps checkout "$PROTOMAPS_BASEMAPS_REF"

      - name: Restore cached source files
        id: source-cache
        uses: actions/cache@v4
        with:
          path: basemaps/tiles/data/sources
          key: hk-pmtiles-sources-${{ env.SOURCE_CACHE_VERSION }}

      - name: Download data sources
        working-directory: basemaps/tiles
        run: |
          download() {
            local url="$1"
            local target="$2"
            if [ -s "$target" ]; then
              echo "Using cached $(basename "$target")"
              return 0
            fi
            curl -fL --retry 5 --retry-delay 5 --retry-all-errors --connect-timeout 30 "$url" -o "$target"
          }

          mkdir -p data/sources
          download "$HONG_KONG_PBF_URL" data/sources/hong-kong.osm.pbf
          download "$NATURAL_EARTH_URL" data/sources/natural_earth_vector.sqlite.zip
          download "$QRANK_URL" data/sources/qrank.csv.gz
          download "$WATER_POLYGONS_URL" data/sources/water-polygons-split-3857.zip
          download "$LAND_POLYGONS_URL" data/sources/land-polygons-split-3857.zip
          download "$LANDCOVER_URL" data/sources/daylight-landcover.gpkg
          download "$PGF_ENCODING_URL" data/sources/pgf-encoding.zip
          ls -lh data/sources

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Hong Kong PMTiles
        working-directory: basemaps/tiles
        run: |
          mvn -B clean package
          java -Xmx10g -jar target/protomaps-basemap-HEAD-with-deps.jar \
            --area=hong-kong \
            --output=../../hong-kong.pmtiles \
            --force

      - name: Copy example config if repo config is missing
        run: |
          if [ ! -f config.js ]; then
            cp config.example.js config.js
          fi

      - name: Prepare artifact metadata
        run: |
          ls -lh hong-kong.pmtiles
          date -u +"%Y-%m-%d %H:%M UTC" > generated-at.txt

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
